apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: wordpress-mysql-set
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/akash-Paiavula/argo-cd.git
        revision: main
        directories:
          - path: DataStore
          - path: DataStoreFront

  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/akash-Paiavula/repos.git
        targetRevision: main
        path: '{{path.basename}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: default

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
